<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para la negrita💜</title>
<style>
  :root{
    --amarillo:#FFD100;
    --azul:#003893;
    --rojo:#CE1126;
    --crema:#fff9e6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:linear-gradient(135deg,#fff9e6 0%,#ffeef5 100%);
    color:#2a2a2a;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .floating{
    position:fixed;
    top:-50px;
    animation:fall linear infinite;
    z-index:0;
    opacity:.8;
    pointer-events:none;
  }
  @keyframes fall{ to{transform:translateY(110vh) rotate(360deg);} }

  .card{
    position:relative;
    z-index:1;
    background:#fff;
    border-radius:26px;
    max-width:480px;
    width:100%;
    padding:30px 22px 36px;
    box-shadow:0 18px 50px rgba(0,0,0,.18);
    text-align:center;
    border:6px solid var(--amarillo);
    animation:pop .6s ease;
  }
  @keyframes pop{ from{transform:scale(.85);opacity:0;} to{transform:scale(1);opacity:1;} }

  .flag-bar{
    display:flex;height:10px;border-radius:6px;overflow:hidden;margin-bottom:20px;
  }
  .flag-bar span{flex:1;}
  .f-amarillo{background:var(--amarillo);flex:2 !important;}
  .f-azul{background:var(--azul);}
  .f-rojo{background:var(--rojo);}

  .cat-frame{
    width:180px;height:180px;margin:0 auto 18px;border-radius:50%;
    overflow:hidden;border:5px solid var(--azul);
    box-shadow:0 8px 20px rgba(0,0,0,.2);background:#eee;
  }
  .cat-frame img{width:100%;height:100%;object-fit:cover;}

  /* Galería de 3 imágenes */
  .gallery{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin:0 auto 18px;
  }
  .gallery .pic{
    width:110px;height:110px;
    border-radius:16px;
    overflow:hidden;
    border:4px solid var(--amarillo);
    box-shadow:0 6px 16px rgba(0,0,0,.18);
    background:#eee;
  }
  .gallery .pic img{width:100%;height:100%;object-fit:cover;}

  /* Marco para el video del paso 3 */
  .video-frame{
    width:100%;
    max-width:320px;
    margin:0 auto 18px;
    border-radius:18px;
    overflow:hidden;
    border:5px solid var(--azul);
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    background:#000;
  }
  .video-frame video{width:100%;display:block;}
  @media(max-width:420px){
    .gallery .pic{width:90px;height:90px;}
  }

  h1{font-size:1.7rem;color:var(--rojo);line-height:1.25;}

  /* Pantallas (steps) */
  .step{display:none;animation:fade .5s ease;}
  .step.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .question{
    font-size:1.45rem;font-weight:800;color:var(--azul);
    line-height:1.3;margin-bottom:8px;
  }
  .match{
    background:var(--crema);border-radius:16px;padding:16px;
    margin:16px 0;border:2px dashed var(--amarillo);
  }
  .teams{font-size:1.3rem;font-weight:800;}
  .vs{color:var(--rojo);margin:0 6px;}
  .hour{font-size:1.2rem;font-weight:700;color:var(--rojo);margin-top:8px;}

  button{
    font-family:inherit;font-weight:700;border:none;border-radius:16px;
    cursor:pointer;transition:transform .15s,background .2s;
    -webkit-tap-highlight-color:transparent;
  }
  button:active{transform:scale(.95);}

  .start-btn{
    background:var(--rojo);color:#fff;font-size:1.2rem;
    padding:16px 32px;box-shadow:0 6px 0 #9c0d1d;margin-top:10px;
  }

  .btns{
    margin-top:24px;position:relative;height:150px;
    display:flex;align-items:center;justify-content:center;gap:18px;
  }
  #yes{
    background:var(--rojo);color:#fff;font-size:1.2rem;
    padding:16px 34px;box-shadow:0 6px 0 #9c0d1d;
    position:relative;z-index:2;transition:transform .2s,font-size .2s,padding .2s;
  }
  #no{
    background:#ddd;color:#555;font-size:1.1rem;padding:14px 28px;
    position:relative;z-index:3;
    transition:left .18s ease, top .18s ease;
  }

  .result{
    font-size:1.55rem;font-weight:800;color:var(--rojo);line-height:1.3;
  }
  .result small{
    display:block;font-size:1rem;color:#555;font-weight:400;margin-top:10px;
  }
  .burst{font-size:2.2rem;margin-top:14px;}
</style>
</head>
<body>

<div class="card">
  <div class="flag-bar">
    <span class="f-amarillo"></span><span class="f-azul"></span><span class="f-rojo"></span>
  </div>

  <!-- PASO 1 -->
  <div class="step active" id="step1">
    <!-- IMAGEN DEL PASO 1 -> cambia foto1.jpg por tu archivo -->
    <div class="cat-frame"><img src="./images.jpg" alt="imagen 1"></div>
    <h1>Tengo una pregunta importante para ti 💛</h1>
    <button class="start-btn" onclick="goStep2()">Ábreme 🙈</button>
  </div>

  <!-- PASO 2 -->
  <div class="step" id="step2">
    <!-- IMAGEN DEL PASO 2 -> cambia foto2.jpg por tu archivo -->
    <div class="cat-frame"><img src="./de85f2dc-3e82-4212-b3f7-e36c5e4c898a.webp" alt="imagen 2"></div>
    <p class="question">¿Quieres ir a ver el partido conmigo?</p>
    <div class="match">
      <div class="teams">Colombia <span class="vs">VS</span> Portugal </div>
      <div class="hour"> Hoy a las 6:30 PM</div>
    </div>
    <div class="btns">
      <button id="yes" onclick="sayYes()">¡Sí! 💛</button>
      <button id="no">No</button>
    </div>
  </div>

  <!-- PASO 3 -->
  <div class="step" id="step3">
    <!-- IMAGEN DEL PASO 3 -> cambia foto3.jpg por tu archivo -->
    <div class="cat-frame"><img src="./lucho.webp" alt="imagen 3"></div>
    <div class="result">
      Yo sabía que ibas a decir que sí 😻
      
      <small>Nos vemos a las 6:30 PM. ¡Vamos Colombia!</small>
    </div>
  </div>
</div>

<script>
  // Fondo cayendo
  const emojis = ['💛','💙','❤️','⚽','🐱','😻','🇨🇴'];
  function rain(n, fast){
    for(let i=0;i<n;i++){
      const e=document.createElement('div');
      e.className='floating';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.left=Math.random()*100+'vw';
      e.style.animationDuration=((fast?3:6)+Math.random()*(fast?4:8))+'s';
      e.style.fontSize=(18+Math.random()*22)+'px';
      document.body.appendChild(e);
    }
  }
  rain(16,false);

  function goStep2(){
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
  }

  function sayYes(){
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step3').classList.add('active');
    rain(34,true);
  }

  // ---- Botón "No": huye y NO se deja seleccionar ----
  const noBtn=document.getElementById('no');
  const yes=document.getElementById('yes');
  let grow=1;

  function flee(ev){
    if(ev){ ev.preventDefault(); }
    const card=document.querySelector('.btns');
    const cw=card.clientWidth, ch=card.clientHeight;
    const bw=noBtn.offsetWidth, bh=noBtn.offsetHeight;
    // Al primer intento, pasa a posición libre para poder huir
    if(noBtn.style.position!=='absolute'){
      noBtn.style.position='absolute';
    }
    const x=Math.random()*Math.max(0,cw-bw);
    const y=Math.random()*Math.max(0,ch-bh);
    noBtn.style.left=x+'px';
    noBtn.style.top=y+'px';
    // El "Sí" se hace más grande cada intento
    grow=Math.min(grow+0.12,1.9);
    yes.style.transform='scale('+grow+')';
    return false;
  }

  // Mouse (PC)
  noBtn.addEventListener('mouseover',flee);
  noBtn.addEventListener('mousedown',flee);
  noBtn.addEventListener('click',flee);
  // Touch (móvil) — huye antes de poder seleccionarlo
  noBtn.addEventListener('touchstart',flee,{passive:false});
  noBtn.addEventListener('pointerdown',flee);
</script>
</body>
</html>
